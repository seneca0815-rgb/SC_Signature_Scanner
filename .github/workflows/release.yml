name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      # ---------------------------------------------------------------
      # Prepare files required by tests and the installer
      # ---------------------------------------------------------------
      - name: Prepare config.json from example
        run: Copy-Item -Path config.example.json -Destination config.json -Force
        shell: pwsh

      - name: Generate theme_preview.png
        run: python scripts/generate_theme_preview.py

      # ---------------------------------------------------------------
      # Gate: all tests must pass before building
      # ---------------------------------------------------------------
      - name: Run tests
        run: python -m pytest tests/test_core.py tests/test_setup_wizard.py tests/test_integration.py tests/test_ui_acceptance.py tests/test_installer.py -v

      # ---------------------------------------------------------------
      # Install Tesseract OCR (needed by pytesseract at build time)
      # ---------------------------------------------------------------
      - name: Install Tesseract OCR
        run: choco install tesseract --yes

      # ---------------------------------------------------------------
      # Download Tesseract installer for bundling in the setup package
      # Fetches the latest w64 setup exe from UB-Mannheim via GitHub API
      # ---------------------------------------------------------------
      - name: Download Tesseract installer for redist
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path redist | Out-Null
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/UB-Mannheim/tesseract/releases/latest"
          $asset   = $release.assets | Where-Object { $_.name -like "tesseract-ocr-w64-setup-*.exe" } | Select-Object -First 1
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "redist\tesseract-setup.exe"
          Write-Host "Downloaded $($asset.name)"

      # ---------------------------------------------------------------
      # Generate brand assets (icons, installer BMPs, theme preview)
      # ---------------------------------------------------------------
      - name: Generate brand assets
        run: python scripts/generate_assets.py

      # ---------------------------------------------------------------
      # Build exe with PyInstaller
      # ---------------------------------------------------------------
      - name: Build exe
        run: >
          pyinstaller main.py
          --onefile --noconsole
          --add-data "config.example.json;."
          --add-data "lookup.json;."
          --add-data "themes.py;."
          --add-data "setup_wizard.py;."
          --add-data "overlay.py;."
          --add-data "app_state.py;."
          --add-data "overlay_window.py;."
          --add-data "control_panel.py;."
          --add-data "tray_icon.py;."
          --add-data "logger_setup.py;."
          --add-data "sounds;sounds"
          --icon "vargo_icon.ico"
          --name "SCSigReader"

      - name: Copy data files to dist
        shell: pwsh
        run: |
          Copy-Item -Path config.json          -Destination dist\config.json
          Copy-Item -Path lookup.json          -Destination dist\lookup.json
          Copy-Item -Path themes.py            -Destination dist\themes.py
          Copy-Item -Path vargo_icon_256.png   -Destination dist\vargo_icon_256.png -ErrorAction SilentlyContinue

      # ---------------------------------------------------------------
      # Check for optional sound files (missing is non-fatal)
      # ---------------------------------------------------------------
      - name: Check sound files
        shell: pwsh
        run: |
          if (Test-Path "sounds\init.wav") {
            echo "Sound files found – will be included in installer"
          } else {
            echo "Warning: No WAV files in sounds\ – installer will use beep fallback"
          }

      # ---------------------------------------------------------------
      # Build installer with Inno Setup
      # ---------------------------------------------------------------
      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Build installer
        shell: cmd
        run: '"%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" SCSigReader.iss'

      # ---------------------------------------------------------------
      # Publish GitHub Release
      # ---------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/SCSigReader_Setup_1.0.exe
          generate_release_notes: true
